<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Tá Na Mão | Delivery</title>

    <meta name="description" content="O seu marketplace de delivery rápido e fácil." />
    <meta name="theme-color" content="#10b981" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <meta property="og:title" content="Tá Na Mão Delivery" />
    <meta property="og:description" content="Peça comida, acompanhe o motoboy e receba rapidinho." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icon-512.png" />

    <link rel="icon" type="image/png" sizes="32x32" href="/icon-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Registra o Service Worker para habilitar PWA e Web Push
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('[PWA] Service Worker registrado com sucesso:', registration.scope);
            })
            .catch(error => {
              console.log('[PWA] Falha ao registrar o Service Worker:', error);
            });
        });
      }
    </script>
  </body>
</html>
