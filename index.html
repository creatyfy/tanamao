<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Tá Na Mão | Delivery</title>

    <meta name="description" content="Your fast and easy delivery marketplace." />
    <meta name="theme-color" content="#10b981" />
    
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <meta property="og:title" content="Tá Na Mão Delivery" />
    <meta property="og:description" content="Order food, track the courier, and get it delivered fast." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://ibb.co/67X3xfSV" />
    <meta property="og:image:alt" content="Tá Na Mão Delivery Preview" />

    <link rel="icon" type="image/png" sizes="32x32" href="/icon-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('[PWA] Service Worker registered successfully:', registration.scope);
            })
            .catch(error => {
              console.log('[PWA] Failed to register Service Worker:', error);
            });
        });
      }
    </script>
  </body>
</html>
