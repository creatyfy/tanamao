workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Apple Codemagic
    environment:
      xcode: latest
      groups:
        - tanamao
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tanamaoc.delivery
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: 22.13.0
    scripts:
      - name: Install and build
        script: |
          set -euo pipefail
          node --version
          npm --version
          npm install
          npm run build
          echo "Verificando pasta de build..."
          if [ -d "dist" ]; then
            echo "Pasta dist encontrada com sucesso."
            ls -la dist/
          else
            echo "ERRO: Pasta dist não encontrada após npm run build."
            ls -la
            exit 1
          fi
      - name: Setup iOS platform
        script: |
          set -euo pipefail
          rm -rf ios
          npx cap add ios
          cd ios/App
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme App
          cd ../..
          npx cap sync ios
          if [ ! -d "$XCODE_PROJECT" ]; then
            echo "ERRO: Projeto Xcode não encontrado"
            exit 1
          fi
          echo "OK: $XCODE_PROJECT"
      - name: Copy Firebase config
        script: |
          echo "Copiando GoogleService-Info.plist para o projeto iOS..."
          cp assets/GoogleService-Info.plist ios/App/App/GoogleService-Info.plist
          echo "GoogleService-Info.plist copiado com sucesso!"
          ls -la ios/App/App/GoogleService-Info.plist
      - name: Generate app icons
        script: |
          mkdir -p assets
          cp logo_new.png assets/logo.png
          cp logo_new.png assets/icon-only.png
          cp logo_new.png assets/splash.png
          cp logo_new.png assets/splash-dark.png
          npx @capacitor/assets generate --ios
      - name: Resolve Swift Package Manager dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination "generic/platform=iOS"
      - name: Increment iOS build number
        script: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.7" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Tá Na Mão" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string Tá Na Mão" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription 'Usado para tirar foto de perfil da loja ou do motoboy'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Usado para tirar foto de perfil da loja ou do motoboy'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription 'Usado para selecionar foto de perfil da loja, motoboy ou produto'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Usado para selecionar foto de perfil da loja, motoboy ou produto'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryAddUsageDescription 'Usado para salvar fotos do app'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string 'Usado para salvar fotos do app'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :NSLocationWhenInUseUsageDescription 'Precisamos da sua localização para rastrear entregas em tempo real'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string 'Precisamos da sua localização para rastrear entregas em tempo real'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :NSLocationAlwaysAndWhenInUseUsageDescription 'Precisamos da sua localização em segundo plano para rastreamento contínuo das entregas'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :NSLocationAlwaysAndWhenInUseUsageDescription string 'Precisamos da sua localização em segundo plano para rastreamento contínuo das entregas'" "$PLIST"
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Build ipa for distribution
        script: |
          mkdir -p build/ios/xcarchive build/ios/ipa

          cat > /tmp/export_options.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>M8ANBT9754</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.tanamaoc.delivery</key>
              <string>TaNaMao AppStore</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/ios/xcarchive/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="TaNaMao AppStore" \
            DEVELOPMENT_TEAM="M8ANBT9754" \
            COMPILER_INDEX_STORE_ENABLE=NO

          xcodebuild \
            -exportArchive \
            -archivePath build/ios/xcarchive/App.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /tmp/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers

  android-release:
    name: Android Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - tanamao
      vars:
        PACKAGE_NAME: "com.tanamao.delivery"
      node: 22.13.0
      java: 21
    scripts:
      - name: Install and build
        script: |
          set -euo pipefail
          npm install
          npm run build
      - name: Setup Android platform
        script: |
          set -euo pipefail
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android
      - name: Copy Firebase config
        script: |
          set -euo pipefail
          if [ -f "assets/google-services.json" ]; then
            cp assets/google-services.json android/app/google-services.json
            echo "google-services.json copiado de assets/"
          elif [ -f "android/app/google-services.json" ]; then
            echo "google-services.json já existe em android/app/"
          else
            echo "ERRO: google-services.json não encontrado em assets/ nem em android/app/"
            exit 1
          fi
          ls -la android/app/google-services.json
      - name: Generate Android icons
        script: |
          set -euo pipefail
          mkdir -p assets
          if [ ! -f "logo_new.png" ]; then
            echo "ERRO: logo_new.png não encontrado na raiz do projeto."
            exit 1
          fi
          cp logo_new.png assets/logo.png
          cp logo_new.png assets/icon-only.png
          cp logo_new.png assets/splash.png
          cp logo_new.png assets/splash-dark.png
          npx @capacitor/assets generate --android
      - name: Increment Android build number
        script: |
          sed -i '' 's/versionCode [0-9]*/versionCode 10/' android/app/build.gradle
          sed -i '' 's/versionName "[0-9]*\.[0-9]*"/versionName "2.5"/' android/app/build.gradle
      - name: Build Android AAB
        script: |
          set -euo pipefail

          if [ ! -f "tanamao-release.keystore" ]; then
            echo "ERRO: tanamao-release.keystore não encontrado na raiz do projeto"
            exit 1
          fi
          echo "Keystore encontrado"
          cp tanamao-release.keystore android/app/tanamao-release.keystore

          cd android

          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "gradle-wrapper.jar não encontrado, baixando..."
            mkdir -p gradle/wrapper
            curl -sL "https://github.com/gradle/gradle/raw/v8.5.0/gradle/wrapper/gradle-wrapper.jar" \
              -o gradle/wrapper/gradle-wrapper.jar
          fi

          chmod +x gradlew
          echo "Iniciando build do AAB assinado..."
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/tanamao-release.keystore \
            -Pandroid.injected.signing.store.password="tanamao123" \
            -Pandroid.injected.signing.key.alias="tanamao" \
            -Pandroid.injected.signing.key.password="tanamao123" \
            --no-daemon

          if [ ! -f "app/build/outputs/bundle/release/app-release.aab" ]; then
            echo "ERRO: AAB não foi gerado"
            exit 1
          fi
          echo "AAB gerado com sucesso!"
          cd ..

          echo "Gerando APK universal para teste..."
          if [ ! -f "bundletool.jar" ]; then
            wget -q https://github.com/google/bundletool/releases/download/1.15.0/bundletool-all-1.15.0.jar -O bundletool.jar
          fi
          java -jar bundletool.jar build-apks \
            --bundle=android/app/build/outputs/bundle/release/app-release.aab \
            --output=app.apks \
            --mode=universal \
            --ks=android/app/tanamao-release.keystore \
            --ks-pass=pass:tanamao123 \
            --ks-key-alias=tanamao \
            --key-pass=pass:tanamao123
          unzip -o app.apks universal.apk
          echo "APK universal gerado com sucesso!"
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - universal.apk
