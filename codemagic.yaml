workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Apple Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tanamaoc.delivery
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: 22.13.0
    scripts:
      - name: Install dependencies
        script: |
          yarn install
      - name: Build web assets
        script: |
          echo "Node version: $(node --version)"
          echo "Yarn version: $(yarn --version)"
          echo "Listando arquivos raiz:"
          ls -la
          echo "vite.config.ts:"
          cat vite.config.ts
          echo "Iniciando build..."
          yarn build
          echo "Exit code do build: $?"
          ls -la dist/ 2>/dev/null || echo "dist nao existe apos o build"
      - name: Setup iOS platform
        script: |
          if [ ! -d "dist" ]; then
            echo "ERRO: pasta dist não encontrada. O build web falhou."
            exit 1
          fi
          echo "dist encontrado:"
          ls dist/

          echo "Capacitor CLI:"
          ./node_modules/.bin/cap --version

          rm -rf ios

          ./node_modules/.bin/cap add ios

          ./node_modules/.bin/cap sync ios

          echo "Estrutura ios criada:"
          find ios -name "*.xcodeproj" -o -name "*.xcworkspace" 2>/dev/null

          if [ ! -d "$XCODE_PROJECT" ]; then
            echo "ERRO: Projeto Xcode não encontrado em $XCODE_PROJECT"
            exit 1
          fi
          echo "Projeto Xcode encontrado: $XCODE_PROJECT"
      - name: Apply app icons
        script: |
          DEST="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          cp "assets/ios-icons/AppIcon-512@2x.png" "$DEST/AppIcon-512@2x.png"
          cat > "$DEST/Contents.json" << 'EOF'
          {
            "images" : [
              {
                "filename" : "AppIcon-512@2x.png",
                "idiom" : "universal",
                "platform" : "ios",
                "size" : "1024x1024"
              }
            ],
            "info" : {
              "author" : "xcode",
              "version" : 1
            }
          }
          EOF
          echo "Ícone aplicado:"
          ls -la "$DEST/"
      - name: Resolve Swift Package Manager dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination "generic/platform=iOS"
      - name: Increment iOS build number
        script: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Tá Na Mão" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string Tá Na Mão" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription 'Usado para tirar foto de perfil da loja ou do motoboy'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Usado para tirar foto de perfil da loja ou do motoboy'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription 'Usado para selecionar foto de perfil da loja, motoboy ou produto'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Usado para selecionar foto de perfil da loja, motoboy ou produto'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryAddUsageDescription 'Usado para salvar fotos do app'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string 'Usado para salvar fotos do app'" "$PLIST"
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
