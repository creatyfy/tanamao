Guia Passo a Passo: Publicando seu App iOS com Codemagic
O Codemagic é uma plataforma que vai pegar o código do seu GitHub, transformar em um aplicativo iOS (arquivo .ipa) e enviar direto para a Apple (TestFlight/App Store). Como você não tem um Mac para fazer isso manualmente, o Codemagic aluga um "Mac virtual" por alguns minutos para fazer esse trabalho para você.
Aqui está exatamente o que você precisa fazer, clique a clique:
Passo 1: Preparar a Apple (App Store Connect)
Antes do Codemagic fazer a mágica, ele precisa de "permissão" da Apple para enviar o app em seu nome.
Acesse o App Store Connect e faça login com sua conta de desenvolvedor Apple.
Vá em Usuários e Acesso (Users and Access).
Clique na aba Chaves (Keys) e depois em App Store Connect API.
Clique no botão + para criar uma nova chave.
Dê um nome (ex: "Codemagic") e dê o acesso de Administrador (Admin) ou Gerenciador de Apps (App Manager).
Clique em Gerar (Generate).
MUITO IMPORTANTE: Baixe o arquivo .p8 que foi gerado. Você só pode baixar isso UMA VEZ. Guarde-o com segurança.
Anote também o Issuer ID (ID do Emissor) e o Key ID (ID da Chave) que aparecem nessa mesma tela.
Passo 2: Preparar o GitHub
O Codemagic precisa saber o que fazer. O arquivo codemagic.yaml que eu gerei é a "receita de bolo" para ele.
Pegue o arquivo codemagic.yaml que eu te enviei na mensagem anterior.
Coloque ele na pasta principal (raiz) do seu projeto tanamao.
Envie para o GitHub:
Bash
git add codemagic.yaml
git commit -m "Adiciona configuração do Codemagic"
git push
Passo 3: Configurar o Codemagic
Agora vamos conectar tudo!
Acesse codemagic.io e faça login usando sua conta do GitHub.
No menu lateral esquerdo, vá em Teams > Personal Account > Integrations.
Procure por App Store Connect e clique em Connect.
Preencha os dados que você pegou no Passo 1:
Issuer ID
Key ID
API Key (Faça upload do arquivo .p8 que você baixou)
Clique em Save.
Passo 4: Adicionar seu App no Codemagic
Volte para a tela inicial do Codemagic (clique na logo no canto superior esquerdo).
Clique no botão azul Add application.
Selecione GitHub como provedor.
Encontre e selecione o seu repositório creatyfy/tanamao.
Selecione o tipo de projeto. Escolha Other ou Capacitor (não importa muito, pois o Codemagic vai ler o arquivo .yaml automaticamente).
Clique em Finish: Add application.
Passo 5: Rodar a Mágica!
Na tela do seu app no Codemagic, você verá um botão azul escrito Start new build. Clique nele.
Vai abrir uma janelinha. Em "Workflow", certifique-se de que está selecionado iOS Release Build (esse é o nome que eu coloquei no arquivo .yaml).
Clique em Start new build.
E pronto! Agora é só esperar. O Codema
