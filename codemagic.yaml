workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Apple Codemagic

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tanamao.delivery

      node: 22.13.0

    scripts:
      - name: Install dependencies
        script: |
          yarn install

      - name: Build web assets
        script: |
          yarn build

      - name: Add iOS platform if missing
        script: |
          if [ ! -d "ios" ]; then
            yarn add @capacitor/ios
            npx cap add ios
          fi

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Set code signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
