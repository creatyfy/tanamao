workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Apple Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tanamaoc.delivery
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: 22.13.0
    scripts:
      - name: Install dependencies
        script: |
          yarn install
      - name: Build web assets
        script: |
          yarn build
      - name: Setup iOS platform
        script: |
          # Remove pasta ios para garantir setup limpo
          rm -rf ios
          # Adiciona plataforma iOS (Capacitor 8 usa Swift Package Manager, sem Podfile)
          npx cap add ios
          # Sincroniza os assets web com o projeto iOS
          npx cap sync ios
          # Verifica se o projeto Xcode foi criado
          if [ ! -d "$XCODE_PROJECT" ]; then
            echo "ERRO: Projeto Xcode não encontrado em $XCODE_PROJECT"
            find ios -name "*.xcodeproj" -o -name "*.xcworkspace" 2>/dev/null
            exit 1
          fi
          echo "Projeto Xcode encontrado: $XCODE_PROJECT"
      - name: Resolve Swift Package Manager dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination "generic/platform=iOS"
      - name: Increment iOS build number
        script: |
          # Usa o número do build do Codemagic como CFBundleVersion (sempre crescente)
          # BUILD_NUMBER é incrementado automaticamente pelo Codemagic a cada build
          PLIST="ios/App/App/Info.plist"
          # Define CFBundleVersion como o BUILD_NUMBER do Codemagic (ex: 2, 3, 4...)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$PLIST"
          # Define CFBundleShortVersionString como 1.0
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0" "$PLIST"
          echo "CFBundleVersion definido como: $BUILD_NUMBER"
          echo "CFBundleShortVersionString definido como: 1.0"
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
