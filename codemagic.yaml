workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Apple Codemagic
    environment:
      groups:
        - tanamao
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tanamaoc.delivery
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: 22.13.0
    scripts:
      - name: Install and build
        script: |
          set -euo pipefail
          node --version
          npm --version
          npm install
          npm run build
          echo "Verificando pasta de build..."
          if [ -d "dist" ]; then
            echo "Pasta dist encontrada com sucesso."
            ls -la dist/
          else
            echo "ERRO: Pasta dist não encontrada após npm run build."
            ls -la
            exit 1
          fi
      - name: Setup iOS platform
        script: |
          set -euo pipefail
          rm -rf ios
          npx cap add ios
          cd ios/App
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme App
          cd ../..
          npx cap sync ios
          if [ ! -d "$XCODE_PROJECT" ]; then
            echo "ERRO: Projeto Xcode não encontrado"
            exit 1
          fi
          echo "OK: $XCODE_PROJECT"
      - name: Copy Firebase config
        script: |
          echo "Copiando GoogleService-Info.plist para o projeto iOS..."
          cp assets/GoogleService-Info.plist ios/App/App/GoogleService-Info.plist
          echo "GoogleService-Info.plist copiado com sucesso!"
          ls -la ios/App/App/GoogleService-Info.plist
      - name: Generate app icons
        script: |
          mkdir -p assets
          cp logo_new.png assets/logo.png
          cp logo_new.png assets/icon-only.png
          cp logo_new.png assets/splash.png
          cp logo_new.png assets/splash-dark.png
          npx @capacitor/assets generate --ios
      - name: Resolve Swift Package Manager dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination "generic/platform=iOS"
      - name: Increment iOS build number
        script: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.4" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Tá Na Mão" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string Tá Na Mão" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription 'Usado para tirar foto de perfil da loja ou do motoboy'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Usado para tirar foto de perfil da loja ou do motoboy'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription 'Usado para selecionar foto de perfil da loja, motoboy ou produto'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Usado para selecionar foto de perfil da loja, motoboy ou produto'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryAddUsageDescription 'Usado para salvar fotos do app'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string 'Usado para salvar fotos do app'" "$PLIST"
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers

  android-release:
    name: Android Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - tanamao
      vars:
        PACKAGE_NAME: "com.tanamaoc.delivery"
      node: 22.13.0
      java: 21
    scripts:
      - name: Install and build
        script: |
          set -euo pipefail
          npm install
          npm run build
    - name: Increment Android build number
      script: |
        cd android
        sed -i '' 's/versionCode [0-9]*/versionCode 6/' app/build.gradle
        sed -i '' 's/versionName "[0-9]*\.[0-9]*"/versionName "2.2"/' app/build.gradle
        cd ..
    - name: Setup Android platform
      script: |
        set -euo pipefail
        rm -rf android
        npx cap add android
        npx cap sync android
    - name: Copy Firebase config
      script: |
        if [ -f "assets/google-services.json" ]; then
          cp assets/google-services.json android/app/google-services.json
          echo "google-services.json copiado de assets/"
        else
          echo "google-services.json já está em android/app/ — mantendo."
        fi
        ls -la android/app/google-services.json
    - name: Generate Android icons
      script: |
        set -euo pipefail
        mkdir -p assets
        if [ ! -f "logo_new.png" ]; then
          echo "ERRO: logo_new.png não encontrado na raiz do projeto."
          exit 1
        fi
        cp logo_new.png assets/logo.png
        cp logo_new.png assets/icon-only.png
        cp logo_new.png assets/splash.png
        cp logo_new.png assets/splash-dark.png
        npx @capacitor/assets generate --android
        # Limpar mipmap antigos SOMENTE APÓS gerar os novos
        rm -rf android/app/src/main/res/mipmap-*
      - name: Build Android AAB
        script: |
          rm -rf android/.gradle
          rm -rf android/gradle/wrapper/gradle-wrapper.jar
          cd android
          gradle wrapper
          chmod +x gradlew
          cd ..
          if [ -f "tanamao-release.keystore" ]; then
            echo "Keystore encontrado na raiz. Movendo para android/ ..."
            mv tanamao-release.keystore android/tanamao-release.keystore
          else
            echo "ERRO: tanamao-release.keystore NÃO ENCONTRADO na raiz do projeto."
            exit 1
          fi
          cd android
          ./gradlew bundleRelease
          cd ..
          echo "Verificando assinatura do AAB..."
          if [ ! -f "bundletool.jar" ]; then
            wget https://github.com/google/bundletool/releases/download/1.15.0/bundletool-all-1.15.0.jar -O bundletool.jar
          fi
          BUNDLETOOL_CMD="java -jar bundletool.jar"
          $BUNDLETOOL_CMD build-apks --bundle=android/app/build/outputs/bundle/release/app-release.aab --output=app.apks --mode=universal
          unzip -o app.apks universal.apk
          APKSIGNER_PATH=$(find $ANDROID_SDK_ROOT -name "apksigner" | head -n 1)
          if [ -z "$APKSIGNER_PATH" ]; then
            echo "ERRO: apksigner não encontrado."
            exit 1
          fi
          $APKSIGNER_PATH verify universal.apk
          if [ $? -ne 0 ]; then
            echo "ERRO: O AAB NÃO ESTÁ ASSINADO CORRETAMENTE!"
            exit 1
          else
            echo "SUCESSO: O AAB ESTÁ ASSINADO CORRETAMENTE!"
          fi
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
