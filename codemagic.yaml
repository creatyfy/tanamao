workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Apple Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tanamaoc.delivery
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: 22.13.0
    scripts:
      - name: Install dependencies
        script: |
          yarn install
      - name: Build web assets
        script: |
          yarn build
      - name: Setup iOS platform
        script: |
          # Remove pasta ios para garantir setup limpo
          rm -rf ios
          # Adiciona plataforma iOS (Capacitor 8 usa Swift Package Manager, sem Podfile)
          npx cap add ios
          # Sincroniza os assets web com o projeto iOS
          npx cap sync ios
          # Verifica se o projeto Xcode foi criado
          if [ ! -d "$XCODE_PROJECT" ]; then
            echo "ERRO: Projeto Xcode não encontrado em $XCODE_PROJECT"
            find ios -name "*.xcodeproj" -o -name "*.xcworkspace" 2>/dev/null
            exit 1
          fi
          echo "Projeto Xcode encontrado: $XCODE_PROJECT"
      - name: Apply app icons
        script: |
          # Usa sips (nativo do macOS) para gerar todos os tamanhos de ícone iOS
          # a partir de resources/icon.png, sobrescrevendo o ícone padrão do Capacitor
          ICON_SRC="resources/icon.png"
          DEST="ios/App/App/Assets.xcassets/AppIcon.appiconset"

          generate_icon() {
            local size=$1
            local filename=$2
            sips -z $size $size "$ICON_SRC" --out "$DEST/$filename" > /dev/null 2>&1
            echo "Gerado: $filename (${size}x${size})"
          }

          generate_icon 20   "AppIcon-20.png"
          generate_icon 40   "AppIcon-20@2x.png"
          generate_icon 60   "AppIcon-20@3x.png"
          generate_icon 29   "AppIcon-29.png"
          generate_icon 58   "AppIcon-29@2x.png"
          generate_icon 87   "AppIcon-29@3x.png"
          generate_icon 40   "AppIcon-40.png"
          generate_icon 80   "AppIcon-40@2x.png"
          generate_icon 120  "AppIcon-40@3x.png"
          generate_icon 120  "AppIcon-60@2x.png"
          generate_icon 180  "AppIcon-60@3x.png"
          generate_icon 76   "AppIcon-76.png"
          generate_icon 152  "AppIcon-76@2x.png"
          generate_icon 167  "AppIcon-83.5@2x.png"
          generate_icon 1024 "AppIcon-1024.png"

          echo "Todos os ícones iOS aplicados com sucesso!"
      - name: Resolve Swift Package Manager dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination "generic/platform=iOS"
      - name: Increment iOS build number
        script: |
          PLIST="ios/App/App/Info.plist"

          # Build number crescente (evita erro de versão duplicada na App Store)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0" "$PLIST"

          # Resolve "Faltam dados de conformidade" — app não usa criptografia não-isenta
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"

          # Define nome correto do app (sem referência ao Capacitor)
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Tá Na Mão" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string Tá Na Mão" "$PLIST"

          echo "CFBundleVersion: $BUILD_NUMBER"
          echo "CFBundleShortVersionString: 1.0"
          echo "ITSAppUsesNonExemptEncryption: false"
          echo "CFBundleDisplayName: Tá Na Mão"
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
