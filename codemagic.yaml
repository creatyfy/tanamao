workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Apple Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tanamaoc.delivery
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 22.13.0
    scripts:
      - name: Install dependencies
        script: |
          yarn install
      - name: Build web assets
        script: |
          yarn build
      - name: Setup iOS platform
        script: |
          # Remove pasta ios se existir para garantir setup limpo
          rm -rf ios
          # Adiciona plataforma iOS via Capacitor
          npx cap add ios
          # Sincroniza os assets web com o projeto iOS
          npx cap sync ios
          # Verifica se o Podfile foi criado
          if [ ! -f "ios/App/Podfile" ]; then
            echo "ERRO: Podfile não foi criado pelo cap add ios"
            ls -la ios/ || echo "Pasta ios não existe"
            exit 1
          fi
          echo "Podfile criado com sucesso em ios/App/Podfile"
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App
          pod install
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
