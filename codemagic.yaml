workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Apple Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tanamaoc.delivery
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 22.13.0
    scripts:
      - name: Install dependencies
        script: |
          yarn install
      - name: Build web assets
        script: |
          yarn build
      - name: Setup iOS platform
        script: |
          # Remove pasta ios para garantir setup limpo
          rm -rf ios
          # Adiciona plataforma iOS (Capacitor 8 usa Swift Package Manager, sem Podfile)
          npx cap add ios
          # Sincroniza os assets web com o projeto iOS
          npx cap sync ios
          # Verifica se o workspace foi criado
          if [ ! -f "$XCODE_WORKSPACE" ]; then
            echo "ERRO: Workspace Xcode não encontrado em $XCODE_WORKSPACE"
            find ios -name "*.xcworkspace" 2>/dev/null || echo "Nenhum xcworkspace encontrado"
            exit 1
          fi
          echo "Workspace encontrado: $XCODE_WORKSPACE"
      - name: Resolve Swift Package Manager dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -destination "generic/platform=iOS"
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
