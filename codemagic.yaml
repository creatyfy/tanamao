workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Apple Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tanamaoc.delivery
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: 22.13.0
    scripts:
      - name: Install dependencies
        script: |
          yarn install
      - name: Build web assets
        script: |
          yarn build
      - name: Setup iOS platform
        script: |
          # Remove pasta ios para garantir setup limpo
          rm -rf ios
          # Adiciona plataforma iOS (Capacitor 8 usa Swift Package Manager, sem Podfile)
          npx cap add ios
          # Sincroniza os assets web com o projeto iOS
          npx cap sync ios
          # Verifica se o projeto Xcode foi criado
          if [ ! -d "$XCODE_PROJECT" ]; then
            echo "ERRO: Projeto Xcode não encontrado em $XCODE_PROJECT"
            find ios -name "*.xcodeproj" -o -name "*.xcworkspace" 2>/dev/null
            exit 1
          fi
          echo "Projeto Xcode encontrado: $XCODE_PROJECT"
      - name: Apply app icons
        script: |
          # Capacitor 8 + Xcode 26 usa formato de ícone único (single icon):
          # apenas AppIcon-512@2x.png (1024x1024) com idiom=universal, platform=ios
          DEST="ios/App/App/Assets.xcassets/AppIcon.appiconset"

          # Copia o ícone 1024x1024 com o nome correto para o novo formato
          cp "assets/ios-icons/AppIcon-512@2x.png" "$DEST/AppIcon-512@2x.png"

          # Atualiza o Contents.json para o formato do Capacitor 8 + Xcode 26
          cat > "$DEST/Contents.json" << 'EOF'
          {
            "images" : [
              {
                "filename" : "AppIcon-512@2x.png",
                "idiom" : "universal",
                "platform" : "ios",
                "size" : "1024x1024"
              }
            ],
            "info" : {
              "author" : "xcode",
              "version" : 1
            }
          }
          EOF

          echo "Ícone aplicado:"
          ls -la "$DEST/"
          echo "Contents.json:"
          cat "$DEST/Contents.json"
      - name: Resolve Swift Package Manager dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination "generic/platform=iOS"
      - name: Increment iOS build number
        script: |
          PLIST="ios/App/App/Info.plist"

          # Build number crescente (evita erro de versão duplicada na App Store)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0" "$PLIST"

          # Resolve "Faltam dados de conformidade" — app não usa criptografia não-isenta
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"

          # Define nome correto do app (sem referência ao Capacitor)
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Tá Na Mão" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string Tá Na Mão" "$PLIST"

          # PERMISSÕES DE CÂMERA E FOTOS — obrigatórias para upload de foto de perfil no iOS/iPadOS
          # Sem essas chaves, o app crasha ao tentar abrir o seletor de imagens (UIImagePickerController)
          /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription 'Usado para tirar foto de perfil da loja ou do motoboy'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Usado para tirar foto de perfil da loja ou do motoboy'" "$PLIST"

          /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription 'Usado para selecionar foto de perfil da loja, motoboy ou produto'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Usado para selecionar foto de perfil da loja, motoboy ou produto'" "$PLIST"

          /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryAddUsageDescription 'Usado para salvar fotos do app'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string 'Usado para salvar fotos do app'" "$PLIST"

          echo "CFBundleVersion: $BUILD_NUMBER"
          echo "CFBundleShortVersionString: 1.0"
          echo "ITSAppUsesNonExemptEncryption: false"
          echo "CFBundleDisplayName: Tá Na Mão"
          echo "NSCameraUsageDescription: OK"
          echo "NSPhotoLibraryUsageDescription: OK"
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
