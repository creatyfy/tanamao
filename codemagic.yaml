workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Apple Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tanamaoc.delivery
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: 22.13.0
    scripts:
      - name: Install dependencies
        script: |
          yarn install
      - name: Build web assets
        script: |
          yarn build
      - name: Setup iOS platform
        script: |
          # Remove pasta ios para garantir setup limpo
          rm -rf ios
          # Adiciona plataforma iOS (Capacitor 8 usa Swift Package Manager, sem Podfile)
          npx cap add ios
          # Sincroniza os assets web com o projeto iOS
          npx cap sync ios
          # Verifica se o projeto Xcode foi criado
          if [ ! -d "$XCODE_PROJECT" ]; then
            echo "ERRO: Projeto Xcode não encontrado em $XCODE_PROJECT"
            find ios -name "*.xcodeproj" -o -name "*.xcworkspace" 2>/dev/null
            exit 1
          fi
          echo "Projeto Xcode encontrado: $XCODE_PROJECT"
      - name: Apply app icons
        script: |
          # Gera todos os tamanhos de ícone iOS a partir de resources/icon.png
          # e copia para o xcassets (sobrescreve o ícone padrão do Capacitor)
          ICON_SRC="resources/icon.png"
          DEST="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          python3 - <<'PYEOF'
          from PIL import Image
          import os

          src = "resources/icon.png"
          dest = "ios/App/App/Assets.xcassets/AppIcon.appiconset"

          img = Image.open(src).convert("RGB")

          sizes = {
              "AppIcon-20.png": 20,
              "AppIcon-20@2x.png": 40,
              "AppIcon-20@3x.png": 60,
              "AppIcon-29.png": 29,
              "AppIcon-29@2x.png": 58,
              "AppIcon-29@3x.png": 87,
              "AppIcon-40.png": 40,
              "AppIcon-40@2x.png": 80,
              "AppIcon-40@3x.png": 120,
              "AppIcon-60@2x.png": 120,
              "AppIcon-60@3x.png": 180,
              "AppIcon-76.png": 76,
              "AppIcon-76@2x.png": 152,
              "AppIcon-83.5@2x.png": 167,
              "AppIcon-1024.png": 1024,
          }

          for filename, size in sizes.items():
              resized = img.resize((size, size), Image.LANCZOS)
              out = os.path.join(dest, filename)
              resized.save(out, "PNG")
              print(f"Gerado: {filename} ({size}x{size})")

          print("Todos os icones iOS gerados com sucesso!")
          PYEOF
      - name: Resolve Swift Package Manager dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination "generic/platform=iOS"
      - name: Increment iOS build number
        script: |
          PLIST="ios/App/App/Info.plist"

          # Build number crescente (evita erro de versão duplicada na App Store)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0" "$PLIST"

          # Resolve "Faltam dados de conformidade" — app não usa criptografia não-isenta
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"

          # Define nome correto do app (sem referência ao Capacitor)
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Tá Na Mão" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string Tá Na Mão" "$PLIST"

          echo "CFBundleVersion: $BUILD_NUMBER"
          echo "CFBundleShortVersionString: 1.0"
          echo "ITSAppUsesNonExemptEncryption: false"
          echo "CFBundleDisplayName: Tá Na Mão"
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
